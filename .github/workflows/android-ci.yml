name: Android CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Development build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Android SDK/NDK (required for native modules)
        shell: bash
        run: |
          set -u
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"

          SDKROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          echo "Using SDK root: $SDKROOT"

          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"

          if [ -d "$SDKROOT" ]; then
            ls -ld "$SDKROOT" || true
            sudo chown -R "$USER:$USER" "$SDKROOT" || true
            chmod -R u+rwX "$SDKROOT" || true
            ls -ld "$SDKROOT" || true
          fi

          SDKMANAGER="$SDKROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDKROOT/cmdline-tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [ -z "${SDKMANAGER:-}" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found (SDKROOT=$SDKROOT)" >&2
            find "$SDKROOT" -maxdepth 5 -type f -name sdkmanager -print || true
            exit 1
          fi
          echo "Using sdkmanager: $SDKMANAGER"

          set +e
          yes | "$SDKMANAGER" --sdk_root="$SDKROOT" --licenses
          lic_rc=$?
          set -e
          if [ $lic_rc -ne 0 ]; then
            echo "::warning::sdkmanager --licenses exited with code $lic_rc (continuing)"
          fi

          pkgs=(
            "platforms;android-36"
            "build-tools;36.0.0"
            "platform-tools"
            "ndk;27.2.12479018"
          )

          set +e
          install_rc=0
          for attempt in 1 2 3; do
            echo "Installing SDK packages (attempt $attempt/3)..."
            "$SDKMANAGER" --sdk_root="$SDKROOT" --install "${pkgs[@]}"
            install_rc=$?
            if [ $install_rc -eq 0 ]; then
              break
            fi
            echo "::warning::sdkmanager install failed (exit $install_rc) on attempt $attempt; retrying..."
            sleep $((attempt * 15))
          done
          set -e
          if [ $install_rc -ne 0 ]; then
            echo "::error::sdkmanager install failed after retries (exit $install_rc)"
            "$SDKMANAGER" --sdk_root="$SDKROOT" --list || true
            exit $install_rc
          fi

      - name: Restore SonarCloud packages cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Check license boundary
        shell: pwsh
        run: ./scripts/check-license-boundary.ps1 -ReportPath app/build/reports/license-boundary/license-boundary-report.md

      - name: Upload license boundary report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: license-boundary-report
          path: app/build/reports/license-boundary/license-boundary-report.md
          if-no-files-found: warn

      - name: Validate user-story tracker
        run: |
          ./gradlew :app:testDebugUnitTest \
            --tests org.adaway.tasks.UserStoryStatusTrackerTest \
            --dependency-verification=strict \
            --stacktrace

      - name: Run unit tests
        run: ./gradlew test --dependency-verification=strict --stacktrace

      - name: Run lint
        run: ./gradlew :app:lintDebug --dependency-verification=strict --stacktrace

      - name: Build with Gradle
        run: ./gradlew assembleDebug --dependency-verification=strict --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: AdAway-debug
          path: app/build/outputs/apk/debug/app-debug.apk



      - name: Analyze project
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            ./gradlew -Dorg.gradle.jvmargs=-XX:MaxMetaspaceSize=512m sonarqube --dependency-verification=strict
          else
            echo "SONAR_TOKEN not set, skipping analysis"
          fi

  connected-tests:
    name: Connected Android tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install emulator SDK packages
        shell: bash
        run: |
          set -euo pipefail
          SDKROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"

          SDKMANAGER="$SDKROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi

          yes | "$SDKMANAGER" --sdk_root="$SDKROOT" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$SDKROOT" --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "emulator" \
            "system-images;android-34;google_apis;x86_64" \
            "ndk;27.2.12479018"

      - name: Enable KVM
        shell: bash
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator
        shell: bash
        timeout-minutes: 20
        run: |
          set -euo pipefail
          SDKROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          AVDMANAGER="$SDKROOT/cmdline-tools/latest/bin/avdmanager"
          if [ ! -x "$AVDMANAGER" ]; then
            AVDMANAGER="$(command -v avdmanager)"
          fi
          export ANDROID_AVD_HOME="$HOME/.android/avd"
          mkdir -p "$ANDROID_AVD_HOME"
          mkdir -p app/build/ci-artifacts

          echo "no" | "$AVDMANAGER" create avd \
            --force \
            --name adaway-api34 \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_2"
          "$SDKROOT/emulator/emulator" -list-avds \
            | tee app/build/ci-artifacts/avd-list-after-create.txt
          if ! grep -Fxq "adaway-api34" app/build/ci-artifacts/avd-list-after-create.txt; then
            find "$ANDROID_AVD_HOME" -maxdepth 2 -type f -print \
              > app/build/ci-artifacts/avd-home-files.txt || true
            echo "AVD adaway-api34 was not visible to emulator" >&2
            exit 1
          fi

          "$SDKROOT/emulator/emulator" \
            -avd adaway-api34 \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot \
            -no-metrics \
            -gpu swiftshader_indirect \
            > app/build/ci-artifacts/emulator.log 2>&1 &
          echo "$!" > app/build/ci-artifacts/emulator.pid

          timeout 300 adb wait-for-device
          timeout 300 bash -c 'until [ "$(adb shell getprop sys.boot_completed | tr -d "\r")" = "1" ]; do sleep 5; done'
          adb devices -l | tee app/build/ci-artifacts/adb-devices-after-boot.txt
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Start logcat capture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/build/ci-artifacts
          adb logcat -c || true
          adb logcat -v threadtime > app/build/ci-artifacts/connected-logcat.txt 2>&1 &
          echo "$!" > app/build/ci-artifacts/logcat.pid

      - name: Run connected Android tests
        shell: bash
        timeout-minutes: 25
        run: |
          set -euo pipefail
          ./gradlew :app:connectedDebugAndroidTest --dependency-verification=strict --stacktrace

      - name: Collect connected test diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p app/build/ci-artifacts
          if [ -f app/build/ci-artifacts/logcat.pid ]; then
            kill "$(cat app/build/ci-artifacts/logcat.pid)" 2>/dev/null || true
          fi
          timeout 15 adb devices -l > app/build/ci-artifacts/adb-devices-final.txt 2>&1 || true
          timeout 15 adb shell getprop > app/build/ci-artifacts/device-getprop.txt 2>&1 || true
          timeout 15 adb shell dumpsys activity processes \
            > app/build/ci-artifacts/activity-processes.txt 2>&1 || true
          timeout 15 adb logcat -d -v threadtime \
            > app/build/ci-artifacts/connected-logcat-final.txt 2>&1 || true
          find app/build -maxdepth 6 \
            \( -path '*androidTest-results*' -o -path '*reports/androidTests*' \) \
            -print > app/build/ci-artifacts/android-test-report-paths.txt || true

      - name: Upload connected test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: connected-android-test-artifacts
          if-no-files-found: ignore
          path: |
            app/build/ci-artifacts/**
            app/build/outputs/androidTest-results/**
            app/build/reports/androidTests/**
