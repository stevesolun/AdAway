name: Cleanup old releases

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: "How many releases to keep"
        required: true
        default: "3"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete older releases
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_LATEST: ${{ inputs.keep_latest }}
        run: |
          set -euo pipefail

          if ! [[ "$KEEP_LATEST" =~ ^[0-9]+$ ]]; then
            echo "::error::keep_latest must be a non-negative integer."
            exit 1
          fi

          mapfile -t releases < <(
            gh release list \
              --limit 1000 \
              --json tagName,createdAt \
              --jq 'sort_by(.createdAt) | reverse | .[].tagName'
          )

          for index in "${!releases[@]}"; do
            if [ "$index" -lt "$KEEP_LATEST" ]; then
              continue
            fi
            # Keep tags: source archives and GPL source provenance are tag-addressed.
            gh release delete "${releases[$index]}" --yes
          done


