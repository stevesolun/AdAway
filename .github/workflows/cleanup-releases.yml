name: Cleanup old releases

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: "How many releases to keep"
        required: true
        default: "3"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete older releases
        uses: dev-drprasad/delete-older-releases@dfbe6be2a006e9475dfcbe5b8d201f1824c2a9fe
        with:
          keep_latest: ${{ inputs.keep_latest }}
          # Keep tags: source archives and GPL source provenance are tag-addressed.
          delete_tags: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


