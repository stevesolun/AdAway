name: Verify UX sign-off

on:
  workflow_dispatch:
    inputs:
      review_packet_base64:
        description: "Base64-encoded checked ux-matrix-review.md"
        required: true
      reviewer:
        description: "Reviewer identity recorded in ux-signoff-report.md"
        required: true

permissions:
  contents: read

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0

      - name: Decode checked UX review packet
        shell: bash
        env:
          UX_REVIEW_PACKET_BASE64: ${{ inputs.review_packet_base64 }}
        run: |
          set -euo pipefail
          rm -rf ux-matrix ux-signoff
          mkdir -p ux-matrix ux-signoff
          printf '%s' "$UX_REVIEW_PACKET_BASE64" \
            | base64 -d > ux-matrix/ux-matrix-review.md
          test -s ux-matrix/ux-matrix-review.md
          cp ux-matrix/ux-matrix-review.md ux-signoff/ux-matrix-review.md

      - name: Verify UX sign-off
        shell: pwsh
        env:
          REVIEWER: ${{ inputs.reviewer }}
        run: |
          ./scripts/verify-ux-signoff.ps1 `
            -ReviewPacket ux-matrix/ux-matrix-review.md `
            -Reviewer "$env:REVIEWER" `
            -ReportPath ux-signoff/ux-signoff-report.md

      - name: Upload UX sign-off report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ux-signoff-report
          path: |
            ux-signoff/ux-signoff-report.md
            ux-signoff/ux-matrix-review.md
          if-no-files-found: ignore
