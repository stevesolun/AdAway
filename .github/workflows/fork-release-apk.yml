name: Release APK (tagged)

on:
  push:
    tags:
      - "v*"

permissions:
  artifact-metadata: write
  attestations: write
  contents: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0
        with:
          fetch-depth: 0

      - name: Classify release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *b ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify signed release tag
        shell: bash
        env:
          RELEASE_TAG_PUBLIC_KEY_BASE64: ${{ secrets.RELEASE_TAG_PUBLIC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG_PUBLIC_KEY_BASE64:-}" ]; then
            echo "::error::RELEASE_TAG_PUBLIC_KEY_BASE64 is required to verify signed release tags."
            exit 1
          fi
          export GNUPGHOME="$(mktemp -d)"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_TAG_PUBLIC_KEY_BASE64" | base64 -d | gpg --batch --import
          git verify-tag "$GITHUB_REF_NAME"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

      - name: Install Android SDK/NDK (required for native modules)
        shell: bash
        run: |
          set -u
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"

          SDKROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          echo "Using SDK root: $SDKROOT"

          # Some environments error without this file (and sdkmanager may return non-zero).
          mkdir -p "$HOME/.android"
          touch "$HOME/.android/repositories.cfg"

          # Newer runners may have an SDK directory that is not user-writable; sdkmanager needs write access.
          if [ -d "$SDKROOT" ]; then
            ls -ld "$SDKROOT" || true
            sudo chown -R "$USER:$USER" "$SDKROOT" || true
            chmod -R u+rwX "$SDKROOT" || true
            ls -ld "$SDKROOT" || true
          fi

          SDKMANAGER="$SDKROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDKROOT/cmdline-tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          if [ -z "${SDKMANAGER:-}" ] || [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found (SDKROOT=$SDKROOT)" >&2
            find "$SDKROOT" -maxdepth 5 -type f -name sdkmanager -print || true
            exit 1
          fi
          echo "Using sdkmanager: $SDKMANAGER"

          # Accept licenses first (some packages fail to install otherwise).
          set +e
          yes | "$SDKMANAGER" --sdk_root="$SDKROOT" --licenses
          lic_rc=$?
          set -e
          if [ $lic_rc -ne 0 ]; then
            echo "::warning::sdkmanager --licenses exited with code $lic_rc (continuing)"
          fi

          # Install needed packages with retries (downloads can flake on runners).
          pkgs=(
            "platforms;android-36"
            "build-tools;36.0.0"
            "platform-tools"
            "ndk;27.2.12479018"
          )

          set +e
          install_rc=0
          for attempt in 1 2 3; do
            echo "Installing SDK packages (attempt $attempt/3)..."
            "$SDKMANAGER" --sdk_root="$SDKROOT" --install "${pkgs[@]}"
            install_rc=$?
            if [ $install_rc -eq 0 ]; then
              break
            fi
            echo "::warning::sdkmanager install failed (exit $install_rc) on attempt $attempt; retrying..."
            sleep $((attempt * 15))
          done
          set -e
          if [ $install_rc -ne 0 ]; then
            echo "::error::sdkmanager install failed after retries (exit $install_rc)"
            "$SDKMANAGER" --sdk_root="$SDKROOT" --list || true
            exit $install_rc
          fi

      # NOTE: We avoid step-level `if:` expressions referencing `secrets.*` because
      # GitHub can mark the workflow as invalid in forks ("Unrecognized named-value: 'secrets'").
      # Instead, we check the env var at runtime.
      - name: Decode signing keystore (optional)
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            mkdir -p "$HOME/.keystore"
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "$HOME/.keystore/release.jks"
          else
            echo "ANDROID_KEYSTORE_BASE64 not set; release build will fail closed."
          fi

      - name: Configure Gradle release trust material
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.gradle"
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "signingStoreLocation=$HOME/.keystore/release.jks" >> "$HOME/.gradle/gradle.properties"
            echo "signingStorePassword=${SIGNING_STORE_PASSWORD}" >> "$HOME/.gradle/gradle.properties"
            echo "signingKeyAlias=${SIGNING_KEY_ALIAS}" >> "$HOME/.gradle/gradle.properties"
            echo "signingKeyPassword=${SIGNING_KEY_PASSWORD}" >> "$HOME/.gradle/gradle.properties"
          fi
          if [ -n "${UPDATE_MANIFEST_PUBLIC_KEY_BASE64}" ]; then
            echo "updateManifestPublicKeyBase64=${UPDATE_MANIFEST_PUBLIC_KEY_BASE64}" >> "$HOME/.gradle/gradle.properties"
          fi

      - name: Check license boundary
        shell: pwsh
        run: ./scripts/check-license-boundary.ps1 -SourceMode GitTracked -StrictSourceArchive -ReportPath release-boundary/source-license-boundary-report.md

      - name: Build signed release APK
        run: ./gradlew :app:assembleDirectRelease --dependency-verification=strict --no-daemon --stacktrace

      - name: Generate release SBOM
        id: sbom
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew :app:generateSbom --dependency-verification=strict --no-daemon --stacktrace
          SBOM="app/build/reports/sbom/adaway.cdx.json"
          if [ ! -s "$SBOM" ]; then
            echo "::error::Release SBOM was not generated at $SBOM."
            exit 1
          fi
          python3 -m json.tool "$SBOM" >/dev/null
          (cd "$(dirname "$SBOM")" && sha256sum "$(basename "$SBOM")") | tee "$SBOM.sha256"
          echo "path=$SBOM" >> "$GITHUB_OUTPUT"
          echo "sha256_path=$SBOM.sha256" >> "$GITHUB_OUTPUT"

      - name: Select APK artifact
        id: apk
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="app/build/outputs/apk/directRelease/app-directRelease.apk"
          DEST="app/build/outputs/apk/directRelease/AdAway_${VERSION}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> $GITHUB_OUTPUT
          echo "sha256_path=$DEST.sha256" >> $GITHUB_OUTPUT

      - name: Verify release APK identity
        id: apk_identity
        shell: bash
        env:
          ANDROID_RELEASE_CERT_SHA256: ${{ secrets.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          set -euo pipefail
          APK="${{ steps.apk.outputs.path }}"
          VERSION="${GITHUB_REF_NAME#v}"
          SDKROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          BUILD_TOOLS="$(find "$SDKROOT/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          AAPT="$BUILD_TOOLS/aapt"
          APKSIGNER="$BUILD_TOOLS/apksigner"

          if [ -z "${ANDROID_RELEASE_CERT_SHA256:-}" ]; then
            echo "::error::ANDROID_RELEASE_CERT_SHA256 is required for release artifact verification."
            exit 1
          fi
          if [ ! -x "$AAPT" ] || [ ! -x "$APKSIGNER" ]; then
            echo "::error::Android build tools are missing aapt or apksigner."
            exit 1
          fi

          "$APKSIGNER" verify --print-certs "$APK" | tee "$APK.certs.txt"
          ACTUAL_CERT_SHA256="$(
            awk -F': ' '/Signer #1 certificate SHA-256 digest/ { print $2; exit }' "$APK.certs.txt" |
            tr '[:upper:]' '[:lower:]' |
            tr -d ':[:space:]'
          )"
          EXPECTED_CERT_SHA256="$(
            printf '%s' "$ANDROID_RELEASE_CERT_SHA256" |
            tr '[:upper:]' '[:lower:]' |
            tr -d ':[:space:]'
          )"
          if [ "$ACTUAL_CERT_SHA256" != "$EXPECTED_CERT_SHA256" ]; then
            echo "::error::Release APK signer fingerprint does not match ANDROID_RELEASE_CERT_SHA256."
            exit 1
          fi

          BADGING="$("$AAPT" dump badging "$APK")"
          PACKAGE_NAME="$(printf '%s\n' "$BADGING" | sed -n "s/^package: name='\([^']*\)'.*/\1/p")"
          VERSION_NAME="$(printf '%s\n' "$BADGING" | sed -n "s/^package: .*versionName='\([^']*\)'.*/\1/p")"
          VERSION_CODE="$(printf '%s\n' "$BADGING" | sed -n "s/^package: .*versionCode='\([^']*\)'.*/\1/p")"
          if [ "$PACKAGE_NAME" != "org.adaway" ]; then
            echo "::error::Release APK package is '$PACKAGE_NAME', expected 'org.adaway'."
            exit 1
          fi
          if [ "$VERSION_NAME" != "$VERSION" ]; then
            echo "::error::Release APK versionName is '$VERSION_NAME', expected tag version '$VERSION'."
            exit 1
          fi
          if [ -z "$VERSION_CODE" ]; then
            echo "::error::Release APK versionCode could not be read from package badging."
            exit 1
          fi

          (cd "$(dirname "$APK")" && sha256sum "$(basename "$APK")") |
            tee "${{ steps.apk.outputs.sha256_path }}"
          echo "cert_sha256=$ACTUAL_CERT_SHA256" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Generate signed update manifest
        id: update_manifest
        shell: bash
        env:
          UPDATE_MANIFEST_PRIVATE_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PRIVATE_KEY_BASE64 }}
          UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${UPDATE_MANIFEST_PRIVATE_KEY_BASE64:-}" ]; then
            echo "::error::UPDATE_MANIFEST_PRIVATE_KEY_BASE64 is required to sign manifest.json."
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          APK="${{ steps.apk.outputs.path }}"
          MANIFEST="app/build/outputs/update/manifest.json"
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$APK")"
          bash ./scripts/generate-update-manifest.sh \
            --apk "$APK" \
            --version "$VERSION" \
            --version-code "${{ steps.apk_identity.outputs.version_code }}" \
            --cert-sha256 "${{ steps.apk_identity.outputs.cert_sha256 }}" \
            --apk-url "$APK_URL" \
            --private-key-base64 "$UPDATE_MANIFEST_PRIVATE_KEY_BASE64" \
            --public-key-base64 "$UPDATE_MANIFEST_PUBLIC_KEY_BASE64" \
            --out "$MANIFEST" \
            --channel "${{ steps.release_tag.outputs.channel }}" \
            --store adaway \
            --changelog "See GitHub release ${GITHUB_REF_NAME}."
          python3 -m json.tool "$MANIFEST" >/dev/null
          echo "path=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "sha256_path=$MANIFEST.sha256" >> "$GITHUB_OUTPUT"

      - name: Check release artifact license boundary
        shell: pwsh
        run: |
          ./scripts/check-license-boundary.ps1 `
            -SourceMode GitTracked `
            -StrictSourceArchive `
            -ApkPath "${{ steps.apk.outputs.path }}" `
            -SbomPath "${{ steps.sbom.outputs.path }}" `
            -StrictArtifacts `
            -ReportPath release-boundary/artifact-license-boundary-report.md

      - name: Upload release license boundary reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-license-boundary-reports
          path: release-boundary/*.md
          if-no-files-found: warn

      - name: Verify release artifact bundle
        shell: bash
        env:
          UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APK="${{ steps.apk.outputs.path }}"
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$APK")"
          bash ./scripts/verify-release-artifacts.sh \
            --apk "${{ steps.apk.outputs.path }}" \
            --apk-sha256 "${{ steps.apk.outputs.sha256_path }}" \
            --manifest "${{ steps.update_manifest.outputs.path }}" \
            --manifest-sha256 "${{ steps.update_manifest.outputs.sha256_path }}" \
            --sbom "${{ steps.sbom.outputs.path }}" \
            --sbom-sha256 "${{ steps.sbom.outputs.sha256_path }}" \
            --public-key-base64 "$UPDATE_MANIFEST_PUBLIC_KEY_BASE64" \
            --expected-version "$VERSION" \
            --expected-channel "${{ steps.release_tag.outputs.channel }}" \
            --expected-store adaway \
            --expected-apk-url "$APK_URL" \
            --expected-cert-sha256 "${{ steps.apk_identity.outputs.cert_sha256 }}"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.sha256_path }}
            ${{ steps.update_manifest.outputs.path }}
            ${{ steps.update_manifest.outputs.sha256_path }}
            ${{ steps.sbom.outputs.path }}
            ${{ steps.sbom.outputs.sha256_path }}

      - name: Attest release SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ steps.apk.outputs.path }}
          sbom-path: ${{ steps.sbom.outputs.path }}

      - name: Verify release artifact attestations
        shell: bash
        env:
          UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          APK="${{ steps.apk.outputs.path }}"
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$APK")"
          bash ./scripts/verify-release-artifacts.sh \
            --apk "${{ steps.apk.outputs.path }}" \
            --apk-sha256 "${{ steps.apk.outputs.sha256_path }}" \
            --manifest "${{ steps.update_manifest.outputs.path }}" \
            --manifest-sha256 "${{ steps.update_manifest.outputs.sha256_path }}" \
            --sbom "${{ steps.sbom.outputs.path }}" \
            --sbom-sha256 "${{ steps.sbom.outputs.sha256_path }}" \
            --public-key-base64 "$UPDATE_MANIFEST_PUBLIC_KEY_BASE64" \
            --expected-version "$VERSION" \
            --expected-channel "${{ steps.release_tag.outputs.channel }}" \
            --expected-store adaway \
            --expected-apk-url "$APK_URL" \
            --expected-cert-sha256 "${{ steps.apk_identity.outputs.cert_sha256 }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-attestations

      - name: Create GitHub Release + upload APK
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          generate_release_notes: false
          body: |
            AdAway Android release artifact.

            License boundary: this app release remains GPLv3+. A permissive
            relicensing track is documented separately and is not part of this
            APK release.

            Artifacts include the APK, signed update manifest, SHA-256 checksums,
            and CycloneDX SBOM.

            GitHub may also display auto-generated "Source code" zip/tar.gz
            links for this tag. Treat those as GPLv3+ source snapshots governed
            by committed .gitattributes export-ignore rules.
          prerelease: ${{ steps.release_tag.outputs.prerelease }}
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.sha256_path }}
            ${{ steps.update_manifest.outputs.path }}
            ${{ steps.update_manifest.outputs.sha256_path }}
            ${{ steps.sbom.outputs.path }}
            ${{ steps.sbom.outputs.sha256_path }}



