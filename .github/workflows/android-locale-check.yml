name: Android locale validation

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate locales
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62

      - name: Validate locale files
        id: validation
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          cd ${GITHUB_WORKSPACE}
          java .github/workflows/AndroidLocaleChecker.java ${ALL_CHANGED_FILES}

      - name: Fail on locale normalization changes
        if: steps.validation.outputs.patch_applied == 'true'
        run: |
          git diff -- 'app/src/main/res/values*/string*.xml'
          echo "::error::Locale files need normalization. Apply the diff above and push it."
          exit 1
