name: Verify release artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify, for example v13.5.0"
        required: true
      expected_cert_sha256:
        description: "Expected release APK signing certificate SHA-256 digest"
        required: true

permissions:
  contents: read
  attestations: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: "21"

      - name: Download and verify published release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATE_MANIFEST_PUBLIC_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_PUBLIC_KEY_BASE64 }}
          TAG: ${{ inputs.tag }}
          EXPECTED_CERT_SHA256: ${{ inputs.expected_cert_sha256 }}
        run: |
          set -euo pipefail

          if [ -z "${UPDATE_MANIFEST_PUBLIC_KEY_BASE64:-}" ]; then
            echo "::error::UPDATE_MANIFEST_PUBLIC_KEY_BASE64 is required."
            exit 1
          fi
          if ! [[ "$TAG" =~ ^v[^/[:space:]]+$ ]]; then
            echo "::error::tag must be a release tag such as v13.5.0."
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$VERSION" == *b ]]; then
            CHANNEL=beta
          else
            CHANNEL=stable
          fi

          APK_NAME="AdAway_${VERSION}.apk"
          OUT_DIR="release-artifacts"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          for ASSET in \
            "$APK_NAME" \
            "$APK_NAME.sha256" \
            "manifest.json" \
            "manifest.json.sha256" \
            "adaway.cdx.json" \
            "adaway.cdx.json.sha256"
          do
            gh release download "$TAG" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "$ASSET" \
              --dir "$OUT_DIR" \
              --clobber
          done

          APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${APK_NAME}"
          bash ./scripts/verify-release-artifacts.sh \
            --apk "$OUT_DIR/$APK_NAME" \
            --apk-sha256 "$OUT_DIR/$APK_NAME.sha256" \
            --manifest "$OUT_DIR/manifest.json" \
            --manifest-sha256 "$OUT_DIR/manifest.json.sha256" \
            --sbom "$OUT_DIR/adaway.cdx.json" \
            --sbom-sha256 "$OUT_DIR/adaway.cdx.json.sha256" \
            --public-key-base64 "$UPDATE_MANIFEST_PUBLIC_KEY_BASE64" \
            --expected-version "$VERSION" \
            --expected-channel "$CHANNEL" \
            --expected-store adaway \
            --expected-apk-url "$APK_URL" \
            --expected-cert-sha256 "$EXPECTED_CERT_SHA256" \
            --repo "${GITHUB_REPOSITORY}" \
            --report "$OUT_DIR/verification-report.md" \
            --verify-attestations

      - name: Upload release artifact verification report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-artifact-verification-report
          path: release-artifacts/verification-report.md
          if-no-files-found: error
